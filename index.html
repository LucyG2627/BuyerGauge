<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABC Buyer Gauge</title>

<style>

body{
  margin:0;
  width:207px;
  height:207px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.gauge{
  width:207px;
  height:207px;
  border-radius:50%;
  background:linear-gradient(145deg,#ff8a1f,#e95f00);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 6px 12px rgba(0,0,0,.25),
    inset 0 4px 6px rgba(255,255,255,.35);
}

.face{
  width:172px;
  height:172px;
  border-radius:50%;
  position:relative;
  background:radial-gradient(circle,#fff8eb 0%,#f0e4cf 78%,#d1bea0 100%);
  box-shadow:
    inset 0 0 12px rgba(0,0,0,.35),
    0 0 0 3px #222;
  overflow:hidden;
}

.arc{
  position:absolute;
  inset:12px;
  border-radius:50%;
  background:
    conic-gradient(
      from 215deg,
      transparent 0deg,
      transparent 230deg,
      #6aa84f 231deg,
      #6aa84f 262deg,
      #cc1f1a 263deg,
      #cc1f1a 274deg,
      transparent 275deg
    );

  mask:
    radial-gradient(
      circle,
      transparent 71%,
      #000 72%,
      #000 76%,
      transparent 77%
    );
}

.num{
  position:absolute;
  font-weight:700;
  font-size:9px;
  color:#222;
}

.n0{left:30px; top:104px;}
.n2{left:28px; top:72px;}
.n4{left:58px; top:28px;}
.n6{right:42px; top:28px;}
.n8{right:20px; top:73px;}
.n10{right:18px; top:105px;}

.title{
  position:absolute;
  top:52px;
  width:100%;
  text-align:center;
  font-weight:800;
  font-size:10px;
  line-height:11px;
  color:#222;
}

.needle{
  position:absolute;
  width:72px;
  height:6px;
  background:#2c3338;
  top:95px;
  left:86px;
  transform-origin:0% 50%;
  transform:rotate(-135deg);
  border-radius:10px;
  z-index:5;
  box-shadow:0 1px 2px rgba(0,0,0,.35);
  transition:transform .8s ease;
}

.hub{
  position:absolute;
  width:24px;
  height:24px;
  top:84px;
  left:74px;
  border-radius:50%;
  background:#252525;
  z-index:6;
  box-shadow:
    inset 0 0 4px rgba(255,255,255,.25),
    0 1px 3px rgba(0,0,0,.45);
}

.hub:after{
  content:"";
  position:absolute;
  width:12px;
  height:12px;
  top:6px;
  left:6px;
  border-radius:50%;
  background:#111;
}

.digital{
  position:absolute;
  left:50%;
  bottom:38px;
  transform:translateX(-50%);
  background:#202020;
  color:#f5f5f5;
  font-family:"Courier New",monospace;
  font-size:14px;
  font-weight:700;
  letter-spacing:2px;
  padding:3px 8px;
  border-radius:3px;
  box-shadow:
    inset 0 0 3px #000,
    0 0 0 2px #111;
}

.caption{
  position:absolute;
  bottom:22px;
  width:100%;
  text-align:center;
  font-size:6px;
  font-weight:700;
  color:#333;
}

.status{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:5px;
  color:#777;
}

.screw{
  position:absolute;
  width:7px;
  height:7px;
  bottom:18px;
  border-radius:50%;
  background:#202020;
  box-shadow:
    inset 1px 1px 1px rgba(255,255,255,.35);
}

.screw.left{left:24px;}
.screw.right{right:24px;}

.tick{
  position:absolute;
  left:86px;
  top:86px;
  width:1px;
  height:7px;
  background:#222;
  transform-origin:1px 1px;
}

.tick.small{
  height:4px;
  width:1px;
}

</style>
</head>

<body>

<div class="gauge">
  <div class="face" id="face">

    <div class="arc"></div>

    <!-- Labels -->
    <div class="num n0">0</div>
    <div class="num n2">200</div>
    <div class="num n4">400</div>
    <div class="num n6">600</div>
    <div class="num n8">800</div>
    <div class="num n10">1,000</div>

    <div class="title">
      TOTAL<br>BUYERS
    </div>

    <div class="needle" id="needle"></div>

    <div class="hub"></div>

    <div class="digital" id="buyerCount">
      000000
    </div>

    <div class="caption">
      BUYERS IN DATABASE
    </div>

    <div class="status" id="status">
      Connecting...
    </div>

    <div class="screw left"></div>
    <div class="screw right"></div>

  </div>
</div>

<script>

const JSON_URL =
"https://gist.githubusercontent.com/LucyG2627/80957c760a44a0f5a289f18020d8d5fc/raw/buyers.json";

const MAX_BUYERS = 1000;

const face = document.getElementById("face");

for(let i=0;i<=50;i++){

  const tick = document.createElement("div");

  tick.className =
    i % 5 === 0
    ? "tick"
    : "tick small";

  const angle = -135 + i * 5.4;

  const radius = 72;

  const x =
    86 +
    Math.cos((angle - 90) * Math.PI/180)
    * radius;

  const y =
    86 +
    Math.sin((angle - 90) * Math.PI/180)
    * radius;

  tick.style.left = x + "px";
  tick.style.top = y + "px";

  tick.style.transform =
    "rotate(" + angle + "deg)";

  face.appendChild(tick);

}

function formatCounter(num){

  return String(
    Math.round(num)
  ).padStart(6,"0");

}

function setNeedle(value){

  const clamped =
    Math.max(
      0,
      Math.min(value, MAX_BUYERS)
    );

  const startAngle = -135;
  const endAngle = 135;

  const angle =
    startAngle +
    (clamped / MAX_BUYERS)
    * (endAngle - startAngle);

  document.getElementById("needle")
    .style.transform =
      "rotate(" + angle + "deg)";

}

async function loadCount(){

  try{

    const response =
      await fetch(
        JSON_URL + "?t=" + Date.now(),
        {
          cache:"no-store"
        }
      );

    if(!response.ok){

      throw new Error(
        "HTTP error " + response.status
      );

    }

    const data =
      await response.json();

    const count =
      Number(data.total_buyers);

    document.getElementById("buyerCount")
      .innerText =
        formatCounter(count);

    document.getElementById("status")
      .innerText =
        "Updated " +
        new Date().toLocaleTimeString();

    setNeedle(count);

  }

  catch(error){

    document.getElementById("buyerCount")
      .innerText = "ERROR";

    document.getElementById("status")
      .innerText =
        error.message;

    console.error(error);

  }

}

loadCount();

setInterval(loadCount,30000);

</script>

</body>
</html>
