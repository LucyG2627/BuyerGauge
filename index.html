<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:transparent;
    font-family:Arial,sans-serif;
}

.gauge{
    width:320px;
    height:320px;
    border-radius:50%;
    background:conic-gradient(
        #ef4444 0deg 60deg,
        #f97316 60deg 120deg,
        #eab308 120deg 180deg,
        #84cc16 180deg 240deg,
        #22c55e 240deg 360deg
    );
    display:flex;
    justify-content:center;
    align-items:center;
}

.inner{
    width:250px;
    height:250px;
    background:#FFFFFF;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.number{
    font-size:52px;
    font-weight:bold;
    color:#111;
}

.label{
    margin-top:10px;
    font-size:18px;
    letter-spacing:2px;
}

.status{
    margin-top:8px;
    font-size:11px;
    color:#777;
}
</style>
</head>

<body>

<div class="gauge">
    <div class="inner">
        <div class="number" id="buyerCount">Loading</div>
        <div class="label">TOTAL BUYERS</div>
        <div class="status" id="status">Connecting...</div>
    </div>
</div>

<script>
const JSON_URL = "https://gist.githubusercontent.com/LucyG2627/80957c760a44a0f5a289f18020d8d5fc/raw/cc9af55b9b918af0999a0063175cbd4557a9c5f1/buyers.json";

async function loadCount(){
    try{
        const response = await fetch(JSON_URL, { cache: "no-store" });

        if(!response.ok){
            throw new Error("HTTP error " + response.status);
        }

        const text = await response.text();

        let data;

        try {
            data = JSON.parse(text);
        } catch {
            throw new Error("File is not valid JSON. It returned: " + text.substring(0, 80));
        }

        document.getElementById("buyerCount").innerText =
            Number(data.total_buyers).toLocaleString();

        document.getElementById("status").innerText =
            "Updated " + new Date().toLocaleTimeString();
    }
    catch(error){
        document.getElementById("buyerCount").innerText = "ERROR";
        document.getElementById("status").innerText = error.message;
        console.error(error);
    }
}

loadCount();
setInterval(loadCount,30000);
</script>

</body>
</html>
